services:
  - type: web
    name: civiclemma-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # AWS Configuration
      - key: AWS_REGION
        value: ap-south-1
      - key: DYNAMODB_TABLE_PREFIX
        value: civiclemma_
      - key: S3_BUCKET_NAME
        sync: false
      - key: CLOUDFRONT_DOMAIN
        sync: false
      - key: COGNITO_USER_POOL_ID
        sync: false
      - key: COGNITO_CLIENT_ID
        sync: false
      - key: BEDROCK_MODEL_ID
        value: anthropic.claude-3-haiku-20240307-v1:0
      - key: BEDROCK_REGION
        value: us-east-1
      # CORS - set to your frontend URL
      - key: CORS_ORIGIN
        sync: false
      # Google APIs
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      # ML Service URL
      - key: ML_SERVICE_URL
        sync: false
